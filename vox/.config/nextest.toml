# Enable experimental features
experimental = ["setup-scripts"]

[scripts.setup.moire-env]
command = ['sh', '-c', 'echo "MOIRE_DASHBOARD=127.0.0.1:9119" >> "$NEXTEST_ENV"']

[profile.loom]
slow-timeout = { period = "10s", terminate-after = 3 }

[profile.patient]
slow-timeout = { period = "30s", terminate-after = 4 }

[profile.short]
fail-fast = true
status-level = "pass"
slow-timeout = { period = "1s", terminate-after = 2 }

[profile.eternal]
slow-timeout = { period = "3600s", terminate-after = 3600 }

[profile.coverage]
# Coverage-instrumented binaries are significantly slower on transport-heavy tests.
slow-timeout = { period = "30s", terminate-after = 8 }
fail-fast = false
status-level = "pass"

[profile.moire]
slow-timeout = { period = "1h", terminate-after = 24 }

[[profile.moire.scripts]]
filter = 'all()'
setup = 'moire-env'

[profile.default]
# Fail fast - stop on first failure
fail-fast = true

# Status level
status-level = "pass"

# Slow test warning threshold
slow-timeout = { period = "2s", terminate-after = 8 }

[[profile.default.overrides]]
filter = 'test(lang_swift_transport_)'
# Swift transport spec tests may pay the first release subject build inside
# the harness when the subject is stale or absent.
slow-timeout = { period = "60s", terminate-after = 8 }

[[profile.default.overrides]]
filter = 'test(swift_tcp_subject_exits_when_harness_shutdowns)'
# This lifecycle test also builds the release Swift subject when it is stale.
slow-timeout = { period = "60s", terminate-after = 8 }
