[workspace]
resolver = "2"
members = [
  "rust-examples",
  "xtask",
  "spec/spec-proto",
  "spec/spec-tests",
  "rust/vox-types",
  "rust/vox-schema",
  "rust/vox-core",
  "rust/vox-stream",
  "rust/vox-websocket",
  "rust/vox-inprocess",
  "rust/vox-local",
  "rust/vox-fdpass",
  "rust/vox-shm",
  "rust/shm-primitives",
  "rust/shm-primitives-async",
  "rust/vox-shm-ffi",
  "rust/ur-taking-me-with-you",
  "rust/vox-macros-parse",
  "rust/vox-macros-core",
  "rust/vox-macros",
  "rust/vox",
  "rust/vox-bench",
  "rust/subject-rust",
  "rust/vox-codegen",
  "rust/facet-cbor",
  "rust/vox-postcard",
  "rust/wasm-browser-tests",
  "rust/wasm-inprocess-tests",
  "typescript/peer-server",
]
exclude = ["fuzz"]

[workspace.package]
version = "7.3.0"
edition = "2024"
rust-version = "1.91"
readme = "README.md"
license = "MIT OR Apache-2.0"
repository = "https://github.com/bearcove/vox"
homepage = "https://github.com/bearcove/vox"
documentation = "https://docs.rs/vox"
keywords = ["rpc", "ipc", "shared-memory", "serde", "networking"]
categories = ["network-programming", "asynchronous"]

[workspace.dependencies]
# Internal crates
vox = { path = "rust/vox", version = "7.3.0" }
vox-types = { path = "rust/vox-types", version = "7.3.0" }
vox-schema = { path = "rust/vox-schema", version = "7.3.0" }
vox-macros-parse = { path = "rust/vox-macros-parse", version = "7.3.0" }
vox-macros-core = { path = "rust/vox-macros-core", version = "7.3.0" }
vox-service-macros = { path = "rust/vox-macros", version = "7.3.0" }
vox-core = { path = "rust/vox-core", version = "7.3.0" }
vox-stream = { path = "rust/vox-stream", version = "7.3.0" }
vox-codegen = { path = "rust/vox-codegen", version = "7.3.0" }
vox-websocket = { path = "rust/vox-websocket", version = "7.3.0" }
vox-inprocess = { path = "rust/vox-inprocess", version = "7.3.0" }
vox-local = { path = "rust/vox-local", version = "7.3.0" }
vox-shm = { path = "rust/vox-shm", version = "7.3.0" }
vox-shm-ffi = { path = "rust/vox-shm-ffi", version = "7.3.0" }
spec-proto = { path = "spec/spec-proto", version = "7.3.0" }
shm-primitives = { path = "rust/shm-primitives", version = "7.3.0", default-features = false }
shm-primitives-async = { path = "rust/shm-primitives-async", version = "7.3.0", default-features = false }
vox-postcard = { path = "rust/vox-postcard", version = "7.3.0" }
facet-cbor = { path = "rust/facet-cbor", version = "7.3.0" }
ur-taking-me-with-you = { path = "rust/ur-taking-me-with-you", version = "7.3.0" }

# Not internal crates
moire = { git = "https://github.com/bearcove/moire", rev = "13eac79" }
moire-types = { git = "https://github.com/bearcove/moire", rev = "13eac79" }

bitflags = "2.11.0"
structstruck = "0.5.1"
bytes = "1"
blake3 = "1.8"
heck = "0.5"
proc-macro2 = "1"
quote = "1"
syn = { version = "2", features = ["full"] }
tokio = { version = "1", features = ["sync", "rt", "time", "macros", "io-util"] }
tokio-tungstenite = "0.26"
libc = "0.2.180"
tempfile = "3.23"
xshell = "0.2"
passfd = "0.1"

# facet ecosystem
facet = { version = "0.44.1", features = ["camino", "reflect"] }
facet-core = { version = "0.44.1" }
facet-postcard = { version = "0.44.1", features = ["camino"] }
facet-path = { version = "0.44.1" }
facet-reflect = { version = "0.44.1" }
facet-format = { version = "0.44.1" }
facet-pretty = { version = "0.44.1" }
facet-json = { version = "0.44.1" }
facet-value = { version = "0.44.1" }
facet-testhelpers = { version = "0.44.1" }
facet-cargo-toml = { version = "0.44.0" }
facet-error = { version = "0.44.1" }

# Futures utilities
futures-channel = "0.3"
futures-util = "0.3"

# WASM support
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
js-sys = "0.3"
web-sys = "0.3"

# Tracing
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
static_assertions = "1.1.0"
ulid = "1"

indexmap = "2"
smallvec = "1.15.1"
getrandom = { version = "0.3", features = ["wasm_js"] }
zerocopy = { version = "0.8", features = ["derive"] }

# Benchmarking
divan = "0.1"
dprint-plugin-typescript = "0.95"
figue = "2.0.0"
prettyplease = "0.2"
insta = "1"
unsynn = "0.3"
cbindgen = "0.28"
loom = "0.7"
windows-sys = "0.61"
tarpc = { version = "0.37", features = ["tokio1", "serde1"] }
tonic = "0.14"
prost = "0.14"
tonic-prost = "0.14"
tonic-prost-build = "0.14"
serde = { version = "1", features = ["derive"] }
hyper-util = "0.1"
tower = "0.5"
tokio-stream = "0.1"
eyre = "0.6"

# [patch."https://github.com/facet-rs/facet"]
# facet = { path = "../facet/facet" }
# facet-core = { path = "../facet/facet-core" }
# facet-postcard = { path = "../facet/facet-postcard" }
