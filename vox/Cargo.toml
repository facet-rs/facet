# # Uncomment to develop moire
# [patch."https://github.com/bearcove/moire"]
# moire = { path = "../moire/crates/moire" }
# moire-types = { path = "../moire/crates/moire-types" }

[profile.release]
debug = 1

[profile.samply]
inherits = "release"
debug = true
