[package]
name = "xtask"
version = "3.0.0"
edition = "2024"
publish = false

[package.metadata.docs.rs]
rustdoc-args = ["--html-in-header", "arborium-header.html"]

[package.metadata."docs.rs"]
rustdoc-args = ["--html-in-header", "arborium-header.html"]

[dependencies]
facet.workspace = true
figue = { version = "2.0.0" }
xshell = "0.2"
roam-codegen = { path = "../rust/roam-codegen" }
roam-types = { path = "../rust/roam-types" }
spec-proto = { path = "../spec/spec-proto" }
dprint-plugin-typescript = "0.95"
proc-macro2 = "1"
quote = "1"
prettyplease = "0.2"
syn = { version = "2", features = ["full"] }
