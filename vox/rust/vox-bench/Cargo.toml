[package]
name = "vox-bench"
version.workspace = true
edition.workspace = true
publish = false

[package.metadata]

[package.metadata."docs.rs"]
rustdoc-args = ["--html-in-header", "arborium-header.html"]

[features]
protobuf = [
    "dep:tonic",
    "dep:tonic-prost",
    "dep:prost",
    "dep:hyper-util",
    "dep:tower",
    "dep:tokio-stream",
    "dep:tonic-prost-build",
]
# Run codec benches with mimalloc as the global allocator. Use to measure how
# much of decode time is malloc-floor vs codegen.
mimalloc = ["dep:mimalloc"]
# dhat heap profiler — used by `examples/decode_dhat.rs`. Builds a custom
# global_allocator into the example so the resulting `dhat-heap.json` can be
# opened in dh_view.html for per-call-site allocation breakdown.
dhat-heap = ["dep:dhat"]

[dependencies]
vox.workspace = true
vox-core.workspace = true
vox-types.workspace = true
vox-postcard.workspace = true
vox-jit.workspace = true
spec-proto.workspace = true
subject-rust.workspace = true
facet.workspace = true
vox-stream.workspace = true
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "net"] }
moire.workspace = true
futures-util.workspace = true

tarpc.workspace = true
serde.workspace = true
postcard = { version = "1", features = ["alloc"] }
tonic = { workspace = true, optional = true }
tonic-prost = { workspace = true, optional = true }
prost = { workspace = true, optional = true }
hyper-util = { workspace = true, optional = true }
tower = { workspace = true, optional = true }
tokio-stream = { workspace = true, optional = true }

tempfile.workspace = true
divan.workspace = true
mimalloc = { version = "0.1", optional = true, default-features = false }
dhat = { version = "0.3", optional = true }

[build-dependencies]
tonic-prost-build = { workspace = true, optional = true }

[[bench]]
name = "rpc"
harness = false

[[example]]
name = "decode_dhat"
required-features = ["dhat-heap"]
