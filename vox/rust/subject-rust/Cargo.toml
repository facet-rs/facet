[package]
name = "subject-rust"
version = "7.3.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
description = "Rust subject binary for the compliance suite"

[package.metadata]

[package.metadata."docs.rs"]
rustdoc-args = ["--html-in-header", "arborium-header.html"]

[dependencies]
vox = { workspace = true }
vox-core = { workspace = true }
vox-local.workspace = true
vox-shm.workspace = true
vox-stream = { workspace = true }
vox-types = { workspace = true }
shm-primitives = { workspace = true }
spec-proto.workspace = true
tokio = { workspace = true, features = ["rt", "net"] }
moire = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
