[package]
name = "vox-shm"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
readme = "README.md"
homepage.workspace = true
documentation.workspace = true
keywords.workspace = true
categories.workspace = true
description = "Shared-memory transport for vox — lock-free rings for zero-copy IPC"

[package.metadata]

[package.metadata."docs.rs"]
rustdoc-args = ["--html-in-header", "arborium-header.html"]

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(loom)'] }

[dependencies]
vox-types.workspace = true
shm-primitives.workspace = true
shm-primitives-async.workspace = true
zerocopy = { workspace = true }
tempfile.workspace = true
vox-postcard.workspace = true
tracing.workspace = true

[target.'cfg(unix)'.dependencies]
libc = { workspace = true }

[target.'cfg(loom)'.dependencies]
loom.workspace = true

[dev-dependencies]
tempfile.workspace = true
vox-postcard = { path = "../vox-postcard" }
tokio = { workspace = true, features = ["sync", "rt", "macros", "time"] }
