[package]
name = "vox-types"
version = "0.10.0-rc.3"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
readme = "README.md"
homepage.workspace = true
documentation.workspace = true
keywords.workspace = true
categories.workspace = true
description = "Base types used by vox crates"

[package.metadata]

[package.metadata."docs.rs"]
rustdoc-args = ["--html-in-header", "arborium-header.html"]

[features]
default = []

[dependencies]
blake3.workspace = true
facet.workspace = true
facet-core.workspace = true
facet-reflect.workspace = true
facet-value.workspace = true
vox-phon.workspace = true
heck.workspace = true
indexmap.workspace = true
vox-rt.workspace = true
vox-schema.workspace = true
structstruck.workspace = true

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
tokio.workspace = true

[dev-dependencies]
