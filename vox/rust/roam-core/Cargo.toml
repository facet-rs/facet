[package]
name = "roam-core"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
readme = "README.md"
homepage.workspace = true
documentation.workspace = true
keywords.workspace = true
categories.workspace = true
description = "Core implementations: ReliableLink, ReliableAcceptor, Session"

[package.metadata]

[package.metadata."docs.rs"]
rustdoc-args = ["--html-in-header", "arborium-header.html"]

[features]
default = []
diagnostics = ["moire/diagnostics"]

[dependencies]
roam-types.workspace = true
roam-schema.workspace = true
roam-schema-extract.workspace = true
facet.workspace = true
facet-core.workspace = true
facet-reflect.workspace = true
roam-postcard.workspace = true
tokio.workspace = true
moire.workspace = true
tracing.workspace = true
smallvec.workspace = true
getrandom.workspace = true
zerocopy.workspace = true
facet-error.workspace = true

[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen-futures.workspace = true

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
roam-postcard = { path = "../roam-postcard" }
shm-primitives = { path = "../shm-primitives" }
roam-shm = { path = "../roam-shm" }
tempfile.workspace = true
