[package]
name = "vox-phon"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
description = "phon as a vox codec: encode/decode facet types through phon's typed (schema-driven) path."

[package.metadata]

[package.metadata."docs.rs"]
rustdoc-args = ["--html-in-header", "arborium-header.html"]

[dependencies]
vox-rt = { workspace = true }
phon = { workspace = true, features = ["jit"] }
phon-engine = { workspace = true }
phon-ir = { workspace = true }
phon-jit = { workspace = true }
phon-schema = { workspace = true }
facet = { workspace = true }

[dev-dependencies]
spec-proto = { path = "../../spec/spec-proto" }
vox-types = { path = "../vox-types" }
