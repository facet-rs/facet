[package]
name = "roam"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
description = "Core Roam library crate"
readme = "README.md"
homepage.workspace = true
documentation.workspace = true
keywords.workspace = true
categories.workspace = true

[package.metadata]

[package.metadata."docs.rs"]
rustdoc-args = ["--html-in-header", "arborium-header.html"]

[features]
default = ["runtime"]
runtime = ["dep:roam-core"]

[dependencies]
roam-types.workspace = true
roam-hash.workspace = true
roam-service-macros.workspace = true
roam-core = { workspace = true, optional = true }
facet.workspace = true
facet-postcard.workspace = true
tracing.workspace = true

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "net"] }
roam-stream = { path = "../roam-stream" }
roam-core = { path = "../roam-core" }
shm-primitives = { path = "../shm-primitives" }
roam-shm = { path = "../roam-shm" }
tempfile.workspace = true
tracing-subscriber.workspace = true
