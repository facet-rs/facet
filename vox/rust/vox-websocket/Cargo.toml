[package]
name = "vox-websocket"
version = "0.10.0-rc.5"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
readme = "README.md"
homepage.workspace = true
documentation.workspace = true
keywords.workspace = true
categories.workspace = true
description = "WebSocket transport for vox — message-framed Link over tungstenite"

[package.metadata]

[package.metadata."docs.rs"]
rustdoc-args = ["--html-in-header", "arborium-header.html"]
features = ["axum"]

[features]
# Native-only: bridge an `axum` websocket route to a vox [`Link`].
axum = ["dep:axum"]

[dependencies]
vox-types.workspace = true
vox-core.workspace = true

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
tokio = { workspace = true, features = ["net", "rt", "sync", "macros"] }
tokio-tungstenite.workspace = true
futures-util.workspace = true
axum = { workspace = true, optional = true }

[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen.workspace = true
js-sys.workspace = true
web-sys = { workspace = true, features = [
  "WebSocket",
  "BinaryType",
  "MessageEvent",
  "CloseEvent",
  "ErrorEvent",
] }
futures-channel.workspace = true
futures-util = { workspace = true, features = ["sink"] }

[dev-dependencies]
tokio = { workspace = true, features = ["rt-multi-thread", "macros"] }
