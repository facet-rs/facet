[package]
name = "styx-tree"
version = "5.0.0-rc.4"
edition.workspace = true
rust-version.workspace = true
description = "High-level syntax tree for the Styx configuration language"
license.workspace = true
repository.workspace = true

[package.metadata]

[package.metadata."docs.rs"]
rustdoc-args = ["--html-in-header", "arborium-header.html"]

[features]
default = []
facet = ["dep:facet", "styx-parse/facet"]

[dependencies]
styx-parse.workspace = true
ariadne.workspace = true
facet = { workspace = true, optional = true }
facet-testhelpers.workspace = true

[dev-dependencies]
insta.workspace = true
strip-ansi-escapes.workspace = true
facet = { path = "../facet" }
facet-json = { path = "../facet-json" }
facet-postcard = { path = "../facet-postcard" }
