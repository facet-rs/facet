[package]
name = "styx-tree"
version = "3.0.0"
edition.workspace = true
description = "High-level syntax tree for the Styx configuration language"
license.workspace = true
repository.workspace = true

[package.metadata]

[package.metadata."docs.rs"]
rustdoc-args = ["--html-in-header", "arborium-header.html"]

[features]
default = []
facet = ["dep:facet", "styx-parse/facet"]

[dependencies]
styx-parse.workspace = true
ariadne = "0.6"
facet = { workspace = true, optional = true }
facet-testhelpers.workspace = true

[dev-dependencies]
insta = "1.42"
strip-ansi-escapes.workspace = true
facet.workspace = true
facet-json.workspace = true
facet-postcard.workspace = true
