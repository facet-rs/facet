# Build and deploy website to GitHub Pages
name: Website

on:
  push:
    branches: [main]
    paths:
      - '.config/dodeca.styx'          # source set / mounts / link-check config
      - 'docs/**'                       # primary facet content + templates + sass + static
      - 'styx-docs/**'                  # styx subsite source
      - '*/docs/**'                     # crate subsites (figue/docs, vox/docs, facet-json/docs, …)
      - '*/README.md'                   # crate READMEs embedded via the include shortcode
      - '.github/workflows/website.yml'
      - 'facet-showcase/**'
      - 'facet-*/examples/*showcase*.rs'
  pull_request:
    branches: [main]
    paths:
      - '.config/dodeca.styx'
      - 'docs/**'
      - 'styx-docs/**'
      - '*/docs/**'
      - '*/README.md'
      - '.github/workflows/website.yml'
      - 'facet-showcase/**'
      - 'facet-*/examples/*showcase*.rs'
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: bearcove-ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.10.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: pnpm

      - name: Install website dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install dodeca
        # Pull the binary straight from the GitHub release (GitHub's own `latest`
        # redirect), not the installer.sh — the installer reads its version from
        # the S3 dist mirror, whose `latest` marker lags the GitHub releases.
        run: |
          mkdir -p ~/.cargo/bin
          tmp="$(mktemp -d)"
          curl --proto '=https' --tlsv1.2 -fsSL \
            https://github.com/bearcove/dodeca/releases/latest/download/dodeca-x86_64-unknown-linux-gnu.tar.xz \
            | tar -xJ -C "$tmp"
          cp "$tmp/ddc" ~/.cargo/bin/ddc
          chmod +x ~/.cargo/bin/ddc
          ddc --version

      - name: Build website with dodeca
        run: ~/.cargo/bin/ddc build

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/public

  deploy:
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: bearcove-ubuntu-24.04
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
