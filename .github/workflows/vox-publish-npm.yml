# HANDWRITTEN: facet-dev hands off my pipelines
#
# Migrated from vox/.github/workflows/publish-npm.yml, which stopped
# running once vox/ became a subdirectory of this monorepo instead of its
# own repository (GitHub Actions only reads .github/workflows at the repo
# root).

name: Vox / Publish npm

on:
  push:
    branches: [main]
    paths:
      - "vox/typescript/**"
      - "vox/rust/vox/Cargo.toml"
      - ".github/workflows/vox-publish-npm.yml"

defaults:
  run:
    working-directory: vox

jobs:
  publish:
    name: Publish TypeScript packages
    # npm trusted publishing requires a GitHub-hosted runner.
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    concurrency:
      group: vox-publish-npm-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 11

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          cache-dependency-path: vox/pnpm-lock.yaml
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install TypeScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync TypeScript package versions
        run: node scripts/sync-ts-package-versions.mjs

      - name: Build TypeScript packages
        run: pnpm run build

      - name: Publish npm packages
        run: pnpm -r --filter './typescript/packages/*' publish --access public --no-git-checks --report-summary
        env:
          NPM_CONFIG_PROVENANCE: "true"

      - name: Show publish summary
        if: always()
        run: |
          if [ -f pnpm-publish-summary.json ]; then
            cat pnpm-publish-summary.json
          fi
