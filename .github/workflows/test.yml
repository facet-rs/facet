# HANDWRITTEN: facet-dev hands off my pipelines

name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:

jobs:
  test-x86_64-unknown-linux-gnu:
    runs-on: bearcove-ubuntu-24.04

    container:
      image: ghcr.io/facet-rs/facet-ci:latest-amd64
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 26

      - name: Select Rust 1.92
        shell: bash
        run: |
          rustup toolchain install 1.92 --profile minimal --component rust-src --component clippy --component llvm-tools-preview --component rustfmt
          rustup target add thumbv8m.main-none-eabihf --toolchain 1.92
          echo "RUSTUP_TOOLCHAIN=1.92" >> "$GITHUB_ENV"

      - name: Install system dependencies
        run: apt-get update && apt-get install -y zlib1g-dev

      - uses: Swatinem/rust-cache@v2

      - name: ✨ Run tests with coverage
        shell: bash
        env:
          # Only replay proptest regressions in CI
          PROPTEST_CASES: 0
        run: |
          # Install nightly for coverage with doctests
          rustup toolchain install nightly --component rustfmt

          # Run unit and integration tests with coverage
          cargo +nightly llvm-cov --no-report nextest --features ci -E 'not (binary(postgres_integration) | binary(query_integration) | test(swift))'

          # Run doc tests with coverage (requires nightly)
          cargo +nightly llvm-cov --no-report --doc --features ci

          # Generate merged coverage report
          mkdir coverage
          cargo +nightly llvm-cov report --doctests --lcov --output-path coverage/lcov.info

      - name: ✨ Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: coverage/lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  nostd:
    runs-on: bearcove-ubuntu-24.04

    container:
      image: ghcr.io/facet-rs/facet-ci:latest-amd64
    steps:
      - uses: actions/checkout@v6

      - name: Select Rust 1.92
        shell: bash
        run: |
          rustup toolchain install 1.92 --profile minimal --component rust-src --component clippy --component llvm-tools-preview --component rustfmt
          rustup target add thumbv8m.main-none-eabihf --toolchain 1.92
          echo "RUSTUP_TOOLCHAIN=1.92" >> "$GITHUB_ENV"

      - uses: Swatinem/rust-cache@v2

      - name: ✨ Run nostd tests
        shell: bash
        run: |
          just nostd-ci

  miri:
    runs-on: bearcove-ubuntu-24.04

    container:
      image: ghcr.io/facet-rs/facet-ci:latest-miri-amd64
    steps:
      - uses: actions/checkout@v6

      - uses: Swatinem/rust-cache@v2

      - name: ✨ Run miri
        shell: bash
        run: |
          export CI=true
          just miri

  nightly:
    runs-on: bearcove-ubuntu-24.04

    container:
      image: ghcr.io/facet-rs/facet-ci:latest-miri-amd64
    steps:
      - uses: actions/checkout@v6

      - uses: Swatinem/rust-cache@v2

      - name: ✨ Run nightly feature tests (simd auto-detected)
        shell: bash
        env:
          # Only replay proptest regressions in CI
          PROPTEST_CASES: 0
        run: |
          cargo nextest run --package facet-core --features facet-core/simd,facet-core/bytes

  msrv:
    runs-on: bearcove-ubuntu-24.04

    container:
      image: ghcr.io/facet-rs/facet-ci:latest-amd64
    steps:
      - uses: actions/checkout@v6

      - name: Select Rust 1.92
        shell: bash
        run: |
          rustup toolchain install 1.92 --profile minimal --component rust-src --component clippy --component llvm-tools-preview --component rustfmt
          rustup target add thumbv8m.main-none-eabihf --toolchain 1.92
          echo "RUSTUP_TOOLCHAIN=1.92" >> "$GITHUB_ENV"

      - uses: Swatinem/rust-cache@v2

      - name: ✨ Check MSRV
        shell: bash
        run: |
          just msrv

  docs:
    runs-on: bearcove-ubuntu-24.04

    container:
      image: ghcr.io/facet-rs/facet-ci:latest-amd64
    steps:
      - uses: actions/checkout@v6

      - name: Select Rust 1.92
        shell: bash
        run: |
          rustup toolchain install 1.92 --profile minimal --component rust-src --component clippy --component llvm-tools-preview --component rustfmt
          rustup target add thumbv8m.main-none-eabihf --toolchain 1.92
          echo "RUSTUP_TOOLCHAIN=1.92" >> "$GITHUB_ENV"

      - uses: Swatinem/rust-cache@v2

      - name: ✨ Check documentation
        shell: bash
        env:
          RUSTDOCFLAGS: -D warnings
        run: |
          just docs

  lockfile:
    runs-on: bearcove-ubuntu-24.04

    container:
      image: ghcr.io/facet-rs/facet-ci:latest-amd64
    steps:
      - uses: actions/checkout@v6

      - name: Select Rust 1.92
        shell: bash
        run: |
          rustup toolchain install 1.92 --profile minimal --component rust-src --component clippy --component llvm-tools-preview --component rustfmt
          rustup target add thumbv8m.main-none-eabihf --toolchain 1.92
          echo "RUSTUP_TOOLCHAIN=1.92" >> "$GITHUB_ENV"

      - uses: Swatinem/rust-cache@v2

      - name: ✨ Check lockfile is updated
        shell: bash
        run: |
          cargo update --workspace --locked

  clippy:
    runs-on: bearcove-ubuntu-24.04

    container:
      image: ghcr.io/facet-rs/facet-ci:latest-amd64
    steps:
      - uses: actions/checkout@v6

      - name: Select Rust 1.92
        shell: bash
        run: |
          rustup toolchain install 1.92 --profile minimal --component rust-src --component clippy --component llvm-tools-preview --component rustfmt
          rustup target add thumbv8m.main-none-eabihf --toolchain 1.92
          echo "RUSTUP_TOOLCHAIN=1.92" >> "$GITHUB_ENV"

      - uses: Swatinem/rust-cache@v2

      - name: ✨ Run clippy
        shell: bash
        run: |
          cargo clippy --workspace --all-features --all-targets --keep-going -- -D warnings --allow deprecated

  semver-checks:
    if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
    runs-on: bearcove-ubuntu-24.04
    permissions:
      contents: read
    env:
      CARGO_HTTP_MULTIPLEXING: "false"
      CARGO_NET_RETRY: "10"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: ✨ Run cargo-semver-checks
        uses: obi1kenobi/cargo-semver-checks-action@v2
        with:
          manifest-path: Cargo.toml
          baseline-rev: origin/main
          exclude: facet-testattrs, facet-cargo-toml, facet-axum, rusqlite-facet, rediff, facet-dessert, facet-format, facet-json, facet-json-classics, facet-postcard, facet-msgpack, facet-toml, facet-yaml, facet-format-suite, facet-asn1, facet-csv, facet-xdr, facet-json-schema, facet-typescript, facet-python, facet-lua, facet-value, facet-zod, facet-singularize, facet-dom, facet-xml, facet-xml-node, facet-atom, facet-svg, figue, figue-attrs, picante, picante-macros, facet-styx, serde_styx, styx-cli, styx-compat-tests, styx-cst, styx-embed, styx-embed-macros, styx-ffi, styx-format, styx-gen-go, styx-lsp, styx-lsp-ext, styx-lsp-test-schema, styx-parse, styx-testhelpers, styx-tokenizer, styx-tree, styx-wasm, tree-sitter-styx, facet-tokio-postgres, dibs, dibs-cli, dibs-codegen, dibs-config, dibs-db-schema, dibs-jsonb, dibs-macros, dibs-proto, dibs-qgen, dibs-query-schema, dibs-runtime, dibs-sql, copypatch, phon, phon-codegen, phon-conformance, phon-engine, phon-ir, phon-jit, phon-schema, dockside, my-app, my-app-db, my-app-queries, xtask, rust-examples, vox-xtask, spec-proto, spec-tests, vox-types, vox-rt, vox-rt-macros, vox-schema, vox-core, vox-stream, vox-websocket, vox-inprocess, vox-local, vox-fdpass, vox-ffi, ur-taking-me-with-you, vox-macros-parse, vox-macros-core, vox-service-macros, vox, subject-rust, vox-codegen, vox-phon, wasm-browser-tests, wasm-inprocess-tests, peer-server
          verbose: true

  test-aarch64-apple-darwin:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 26

      - uses: Swatinem/rust-cache@v2
        with:
          cache-bin: "false"

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: ✨ Run nextest tests (macOS)
        shell: bash
        env:
          # Only replay proptest regressions in CI
          PROPTEST_CASES: 0
        run: |
          cargo nextest run --features ci -E 'not (binary(postgres_integration) | binary(query_integration) | test(swift))'

  test-aarch64-unknown-linux-gnu:
    runs-on: ubuntu-24.04-arm
    container:
      image: ghcr.io/facet-rs/facet-ci:latest-arm64
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 26

      - name: Select Rust 1.92
        shell: bash
        run: |
          rustup toolchain install 1.92 --profile minimal --component rust-src --component clippy --component llvm-tools-preview --component rustfmt
          rustup target add thumbv8m.main-none-eabihf --toolchain 1.92
          echo "RUSTUP_TOOLCHAIN=1.92" >> "$GITHUB_ENV"

      - uses: Swatinem/rust-cache@v2

      - name: ✨ Run nextest tests (Linux ARM64)
        shell: bash
        env:
          # Only replay proptest regressions in CI
          PROPTEST_CASES: 0
        run: |
          cargo nextest run --features ci -E 'not (binary(postgres_integration) | binary(query_integration) | test(swift))'

  test-x86_64-pc-windows-msvc:
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 26

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - uses: Swatinem/rust-cache@v2

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: ✨ Run nextest tests (Windows)
        shell: bash
        env:
          # Only replay proptest regressions in CI
          PROPTEST_CASES: 0
        run: |
          cargo nextest run --features ci -E 'not (binary(postgres_integration) | binary(query_integration) | test(swift) | test(typescript))'
