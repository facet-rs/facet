[package]
name = "my-app-queries"
version = "0.1.0"
edition = "2024"
publish = false

[package.metadata]
[package.metadata.cargo-shear]
ignored = ["dibs-runtime"]

[package.metadata."docs.rs"]
rustdoc-args = ["--html-in-header", "arborium-header.html"]

[dependencies]
my-app-db = { path = "../my-app-db" }
dibs-runtime = { path = "../../../dibs-runtime" }

[build-dependencies]
dibs.workspace = true
my-app-db = { path = "../my-app-db" }

[dev-dependencies]
dockside = { path = "../../../dockside" }
tokio = { workspace = true, features = ["macros"] }
tokio-postgres.workspace = true
dibs = { path = "../../../dibs" }
