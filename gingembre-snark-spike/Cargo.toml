# SPIKE — throwaway. See the banner in src/main.rs. This crate exists only to answer
# "can snark be gingembre's front end?" by lowering snark's resolved CST to
# gingembre::ast::Template and diffing the render against the native cst_lower path.
# When the answer lands, DELETE this; the real version code-generates typed views from
# the grammar instead of hand-lowering. Do not let it become a second parser executor.

[package]
name = "gingembre-snark-spike"
version = "0.0.0"
edition = "2024"
publish = false
description = "SPIKE (throwaway): prove snark-as-gingembre-front-end via resolved-CST -> ast::Template, oracle'd against cst_lower."

[dependencies]
snark = { path = "../snark", features = ["json-import"] }
snark-dsl = { path = "../snark-dsl", features = ["native"] }
gingembre = { path = "../gingembre" }
futures = "0.3"
# Reflective typed-AST proof: parse snark's resolved tree straight into a
# #[derive(Facet)] Rust type via facet-reflect's Partial. No facet-format.
facet = { path = "../facet" }
facet-reflect = { path = "../facet-reflect" }
