[package]
name = "styx-lsp"
version = "5.0.0-rc.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
description = "Language server for Styx configuration language"

[package.metadata]

[package.metadata."docs.rs"]
rustdoc-args = ["--html-in-header", "arborium-header.html"]

[dependencies]
tower-lsp.workspace = true
tokio = { workspace = true, features = ["full"] }

# Styx crates
styx-cst.workspace = true
styx-tree.workspace = true
styx-format.workspace = true
styx-embed.workspace = true
facet-styx.workspace = true

# Binary lookup
which.workspace = true

# Error handling
eyre.workspace = true

# Cache support
dirs.workspace = true
sha2.workspace = true
hex.workspace = true

# Logging
tracing.workspace = true
tracing-subscriber = { workspace = true, features = ["env-filter"] }

# Schema hints
facet.workspace = true
glob.workspace = true
serde_json.workspace = true

# LSP extensions (vox RPC)
vox.workspace = true
vox-stream.workspace = true

# Extension protocol
styx-lsp-ext.workspace = true

# Testing
styx-lsp-test-schema.workspace = true

[dev-dependencies]
serde_json.workspace = true
futures.workspace = true
tower = "0.4"

[build-dependencies]
facet.workspace = true
facet-styx.workspace = true
