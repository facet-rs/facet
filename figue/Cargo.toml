[package]
name = "figue"
version = "5.0.0-rc.0"
edition.workspace = true
rust-version.workspace = true
authors = ["Amos Wenger <amos@bearcove.eu>"]
license.workspace = true
repository.workspace = true
homepage = "https://facet.rs"
keywords = ["cli", "args", "parser", "facet", "command-line"]
categories = ["command-line-interface"]
description = "Type-safe CLI arguments, config files, and environment variables powered by Facet reflection"
documentation = "https://docs.rs/figue"

[package.metadata.docs.rs]
rustdoc-args = ["--html-in-header", "arborium-header.html"]

[package.metadata."docs.rs"]
rustdoc-args = ["--html-in-header", "arborium-header.html"]

[dependencies]
camino.workspace = true
figue-attrs.workspace = true
facet.workspace = true
facet-core.workspace = true
facet-format.workspace = true
facet-json.workspace = true
facet-reflect.workspace = true
facet-pretty.workspace = true
facet-error.workspace = true
heck.workspace = true
indexmap = { workspace = true, features = ["std"] }
owo-colors.workspace = true
tracing.workspace = true
ariadne.workspace = true
unicode-width.workspace = true
strip-ansi-escapes.workspace = true
strsim.workspace = true
supports-color.workspace = true

[dev-dependencies]
facet-format = { workspace = true, features = ["tracing"] }
facet-json = { workspace = true, features = ["tracing"] }
facet-reflect = { path = "../facet-reflect", features = ["tracing"] }
facet = { path = "../facet", features = ["all-impls"] }
facet-solver = { path = "../facet-solver" }
facet-testhelpers = { path = "../facet-testhelpers" }
insta.workspace = true
tempfile.workspace = true

[features]
default = ["rich-diagnostics"]
rich-diagnostics = []
doc = ["facet/doc"]
tracing = ["facet-reflect/tracing", "facet-json/tracing", "facet-format/tracing"]

[lints]
workspace = true
