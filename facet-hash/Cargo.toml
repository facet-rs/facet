[package]
name = "facet-hash"
version = "0.50.0-rc.6"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
description = "Reusable Weavy-backed structural hashing plans for Facet values"
keywords = ["hashing", "reflection", "facet", "bytecode"]
categories = ["development-tools", "data-structures"]
homepage = "https://facet.rs"

[package.metadata."docs.rs"]
rustdoc-args = ["--html-in-header", "arborium-header.html"]

[features]
default = []
jit = ["weavy/jit", "dep:copypatch"]
net = ["facet-core/net"]

[dependencies]
facet-core = { workspace = true }
weavy = { workspace = true }

[build-dependencies]
copypatch = { workspace = true, features = ["build"], optional = true }

[dev-dependencies]
divan = { workspace = true }
facet = { path = "../facet" }
facet-reflect = { path = "../facet-reflect" }

[[bench]]
name = "reuse"
harness = false

[lints]
workspace = true
