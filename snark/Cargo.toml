[package]
name = "snark"
version = "0.0.1"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Tree-sitter-compatible grammar package model and parser runtime scaffold."
keywords = ["parsing", "tree-sitter", "incremental", "syntax"]
categories = ["parsing", "text-editors"]
readme = "README.md"

[features]
default = ["std", "tree-sitter-import"]
std = []
json-import = ["dep:facet-json", "facet/indexmap"]
tree-sitter-import = ["std", "json-import"]

[dependencies]
facet = { workspace = true, features = ["indexmap"] }
facet-json = { workspace = true, optional = true }
indexmap.workspace = true

[lints]
workspace = true
