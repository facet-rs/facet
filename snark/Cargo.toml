[package]
name = "snark"
version = "0.0.1"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation = "https://docs.rs/snark"
description = "Tree-sitter-compatible grammar package model and Weavy lowering scaffold."
keywords = ["parsing", "tree-sitter", "incremental", "syntax"]
categories = ["parsing", "text-editors"]
readme = "README.md"
include = [
    "Cargo.toml",
    "README.md",
    "CHANGELOG.md",
    "docs/**",
    "src/**",
    "tests/fixtures/**",
]

[features]
default = []
ci = ["tree-sitter-import"]
json-import = ["dep:facet-json", "facet/indexmap"]
tree-sitter-import = ["json-import"]
weavy-lowering = ["dep:weavy"]

[dependencies]
facet = { workspace = true, features = ["indexmap"] }
facet-json = { workspace = true, optional = true }
indexmap.workspace = true
weavy = { workspace = true, optional = true }

[dev-dependencies]
rediff = { path = "../rediff" }

[lints]
workspace = true

[package.metadata.docs.rs]
all-features = true
