[workspace]
members = [
  # core
  "facet-core",
  "facet",

  # derive macro
  "facet-macros-impl",
  "facet-macros",

  # macro ecosystem (plugin support)
  "facet-macro-types",
  "facet-macro-parse",
  # "facet-macro-template",  # TODO: re-enable when plugin system is ready

  # error derive plugin
  "facet-error",

  # default derive plugin
  "facet-default",

  # reflection
  "facet-reflect",

  # constraint solver
  "facet-solver",

  # test helpers
  "facet-testhelpers",
  "facet-testhelpers-macros",
  "facet-testattrs",

  # pretty printing
  "facet-pretty",

  # misc.
  "facet-urlencoded",
  "facet-axum",

  # utilities
  "facet-path",
  "facet-validate",
  "facet-cargo-toml",

  # strongly-typed string IDs
  "strid",
  "strid-macros",
  "strid-examples",

  # showcase infrastructure
  "facet-showcase",

]
exclude = [
  # tools/ has its own workspace
  "tools",
]
resolver = "3"

[workspace.package]
edition = "2024"
rust-version = "1.90"
license = "MIT OR Apache-2.0"
repository = "https://github.com/facet-rs/facet"

[workspace.dependencies]
facet = { path = "facet", version = "0.50.0-rc.0" }
facet-axum = { path = "facet-axum", version = "0.50.0-rc.0" }
facet-core = { path = "facet-core" }
facet-cargo-toml = { path = "facet-cargo-toml", version = "0.50.0-rc.0" }
facet-error = { path = "facet-error", version = "0.50.0-rc.0" }
facet-json = "0.50.0-rc.0"
facet-msgpack = "0.50.0-rc.0"
facet-postcard = "0.50.0-rc.0"
facet-pretty = { path = "facet-pretty" }
facet-reflect = { path = "facet-reflect", version = "0.50.0-rc.0" }
facet-toml = "0.50.0-rc.0"
facet-xml = "0.50.0-rc.0"
facet-yaml = "0.50.0-rc.0"
facet-urlencoded = { path = "facet-urlencoded", version = "0.50.0-rc.0" }
facet-value = "0.50.0-rc.0"
strid = { path = "strid", version = "11.0.0-rc.0" }
strid-macros = { path = "strid-macros", version = "11.0.0-rc.0" }
arborium = { version = "^2.4.5", default-features = false, features = ["lang-json"] }
autocfg = "^1.5.0"
axum = { version = "0.8.9", default-features = false, features = ["http1", "tokio", "json"] }
bytes = { version = "^1.11.0", default-features = false }
bytestring = { version = "^1.4.0", default-features = false }
camino = "^1.2.1"
compact_str = { version = "^0.9.0", default-features = false }
chrono = { version = "^0.4.42", default-features = false, features = ["alloc"] }
datatest-stable = "0.3"
divan = "^0.1.21"
eyre = "^0.6.12"
http = "^1.4.0"
indexmap = { version = "^2.12.1", default-features = false }
insta = "^1.44.3"
jiff = "^0.2.16"
log = { version = "^0.4.29", features = ["std"] }
owo-colors = "^4.2.3"
proc-macro2 = "1"
quote = "1"
smartstring = { version = "^1.0.1", default-features = false }
smol_str = { version = "^0.3.4", default-features = false }
static_assertions = "^1.1.0"
strsim = "0.11"
tempfile = "^3.23.0"
time = { version = "^0.3.44", features = ["formatting", "macros", "parsing"] }
tokio = { version = "1", features = ["io-util", "rt", "rt-multi-thread"] }
tower = { version = "0.5", default-features = false, features = ["util"] }
tracing = { version = "^0.1.43", default-features = false, features = ["std"] }
tracing-subscriber = { version = "^0.3.22", default-features = false, features = ["fmt", "std"] }
ulid = "^1.2.1"
unsynn = "^0.3.0"
uuid = "^1.19.0"
rust_decimal = { version = "^1.38.0", default-features = false, features = ["std"] }
smallvec = { version = "^1.15", default-features = false }
iddqd = { version = "^0.4.0", default-features = false }

# Allow the facet_no_doc cfg in generated code
# See: https://doc.rust-lang.org/nightly/rustc/check-cfg/cargo-specifics.html
[workspace.lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ["cfg(facet_no_doc)", "cfg(kani)"] }

[workspace.lints.clippy]
# Box::leak is always a bug in this codebase - it hides lifetime problems instead of solving them
disallowed_methods = "deny"

# Profiling profile - release optimizations with line tables for callgrind/perf
[profile.profiling]
inherits = "release"
debug = "line-tables-only"

# Fuzzing profile for cargo-bolero
[profile.fuzz]
inherits = "dev"
opt-level = 3
incremental = false
codegen-units = 1

[profile.dev.package.backtrace]
opt-level = 3

[patch.crates-io]
facet = { path = "facet" }
facet-core = { path = "facet-core" }
facet-default = { path = "facet-default" }
facet-path = { path = "facet-path" }
facet-pretty = { path = "facet-pretty" }
facet-reflect = { path = "facet-reflect" }
facet-solver = { path = "facet-solver" }
facet-testhelpers = { path = "facet-testhelpers" }
facet-axum = { path = "facet-axum" }
facet-cargo-toml = { path = "facet-cargo-toml" }
facet-urlencoded = { path = "facet-urlencoded" }
strid = { path = "strid" }
strid-macros = { path = "strid-macros" }
strid-examples = { path = "strid-examples" }
