[package]
name = "strid"
description = "Improve and strengthen your strings by making them strongly-typed with less boilerplate"
keywords = [ "string", "newtype", "validation", "normalization" ]
categories = [ "data-structures", "rust-patterns" ]
version = "11.0.0-rc.0"
authors = ["Marcus Griep <marcus@griep.us>"]
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
readme = "README.md"

[features]
default = ["alloc"]
alloc = []

[dependencies]
strid-macros.workspace = true
facet = { workspace = true, features = ["bytes"] }

[dev-dependencies]
bytestring = "1.5"
compact_str = "0.9"
quickcheck = "1"
quickcheck_macros = "1.2.0"
serde = { version = "1", features = [ "derive" ] }
serde_json = "1"
smartstring = "1"
static_assertions = "1"

[package.metadata.docs.rs]
rustdoc-args = ["--cfg", "docsrs"]

[package.metadata."docs.rs"]
rustdoc-args = ["--html-in-header", "arborium-header.html"]

[package.metadata.cargo-shear]
ignored = ["serde"]
