[package]
name = "snark-dsl"
version = "0.1.0"
edition = "2024"
publish = false

[package.metadata]

[package.metadata."docs.rs"]
rustdoc-args = ["--html-in-header", "arborium-header.html"]

[features]
default = []
native = ["dep:tempfile"]
typed-ast = ["native", "dep:facet", "dep:facet-json", "dep:snark"]

[dependencies]
facet = { workspace = true, optional = true }
facet-json = { workspace = true, optional = true }
snark = { path = "../snark", features = ["json-import"], optional = true }
tempfile = { version = "3.23.0", optional = true }
thiserror = "2.0.17"

[[bin]]
name = "snark-dsl"
path = "src/main.rs"
required-features = ["native"]
