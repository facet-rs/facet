{% extends "base.html" %}

{% block title %}{{ section.title | default(value=config.title) }}{% endblock title %}

{% block content %}
<article class="doc doc-home">
    <header class="doc-header">
        <h1>{{ section.title }}</h1>
        {% if section.description %}<p class="lede">{{ section.description }}</p>{% endif %}
    </header>
    <div class="doc-body">
        {{ section.content | safe }}
    </div>
</article>
{% endblock content %}
