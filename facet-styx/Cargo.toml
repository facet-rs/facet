[package]
name = "facet-styx"
version = "5.0.0-rc.0"
edition.workspace = true
rust-version.workspace = true
description = "Facet integration for the Styx configuration language"
license.workspace = true
repository.workspace = true

[package.metadata]

[package.metadata."docs.rs"]
rustdoc-args = ["--html-in-header", "arborium-header.html"]

[dependencies]
facet-core.workspace = true
facet-format.workspace = true
facet-reflect.workspace = true
facet.workspace = true
styx-format.workspace = true
styx-parse.workspace = true
styx-tree.workspace = true
ariadne.workspace = true
serde_json.workspace = true

# Tracing (optional - compiles to nothing when disabled)
tracing = { workspace = true, optional = true }

# Figue integration (optional)
figue = { workspace = true, optional = true }

[dev-dependencies]
styx-testhelpers = { path = "../styx-testhelpers" }
tracing.workspace = true
tracing-subscriber = { workspace = true, features = ["fmt", "env-filter"] }
facet-testhelpers = { path = "../facet-testhelpers" }
insta.workspace = true
strip-ansi-escapes.workspace = true
facet-format = { path = "../facet-format", features = ["tracing"] }
facet-reflect = { path = "../facet-reflect", features = ["tracing"] }
figue = { path = "../figue" }
indexmap.workspace = true
similar.workspace = true

[features]
tracing = ["dep:tracing", "facet-format/tracing", "facet-reflect/tracing"]
figue = ["dep:figue"]
