[workspace]
members = [
  "phon/rust/taxon",
  "facet-core",
  "facet",
]
resolver = "3"

[workspace.package]
version = "0.10.0-rc.1"
edition = "2024"
rust-version = "1.92"
license = "MIT OR Apache-2.0"
repository = "https://github.com/facet-rs/facet"
homepage = "https://facet.rs"
documentation = "https://docs.rs/vox"
keywords = ["rpc", "ipc", "networking", "facet"]
categories = ["network-programming", "asynchronous"]

[workspace.dependencies]
zzfacet = { path = "facet", version = "0.50.0-rc.5" }
zzfacet-core = { path = "facet-core", version = "0.50.0-rc.5" }
zzfacet-macros = { path = "facet-macros", version = "0.50.0-rc.5" }
zzfacet-reflect = { path = "facet-reflect", version = "0.50.0-rc.5" }
zzfacet-testhelpers = { path = "facet-testhelpers", version = "0.50.0-rc.5" }
zztaxon = { path = "phon/rust/taxon", version = "0.2.0-rc.5" }
autocfg = "^1.5.0"
blake3 = { version = "^1", default-features = false }
bytes = { version = "^1.11.0", default-features = false }
bytestring = { version = "^1.4.0", default-features = false }
camino = "^1.2.1"
chrono = { version = "^0.4.42", default-features = false, features = ["alloc"] }
compact_str = { version = "^0.9.0", default-features = false }
iddqd = { version = "^0.4.0", default-features = false }
indexmap = { version = "^2.12.1", default-features = false }
jiff = "^0.2.16"
rust_decimal = { version = "^1.38.0", default-features = false, features = ["std"] }
smartstring = { version = "^1.0.1", default-features = false }
smol_str = { version = "^0.3.4", default-features = false }
smallvec = { version = "^1.15", default-features = false }
static_assertions = "^1.1.0"
tempfile = "^3.23.0"
time = { version = "^0.3.44", features = ["formatting", "macros", "parsing"] }
ulid = "^1.2.1"
uuid = "^1.19.0"

[workspace.lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ["cfg(facet_no_doc)", "cfg(kani)"] }

[workspace.lints.clippy]
disallowed_methods = "deny"
