# GraphQL schema — parse-scaling ladder sample.
# Real SDL (enums, interfaces, object types with field args, inputs), sized so you
# can click up the ladder and watch "run parser" grow linearly with the input.

schema {
  query: Query
}

type Query {
  entity0(id: ID!): Entity0
  entity1(id: ID!): Entity1
  entity2(id: ID!): Entity2
  entity3(id: ID!): Entity3
  entity4(id: ID!): Entity4
  entity5(id: ID!): Entity5
  entity6(id: ID!): Entity6
  entity7(id: ID!): Entity7
}

"""Domain module 0 — generated for the parse-scaling ladder."""
enum Status0 {
  ACTIVE
  PENDING
  ARCHIVED
}

interface Node0 {
  id: ID!
  createdAt: String!
}

type Entity0 implements Node0 {
  id: ID!
  createdAt: String!
  name: String!
  status: Status0
  score: Float
  tags: [String!]!
  parent: Entity0
  related(first: Int = 10, after: String, filter: Filter0): [Entity0!]!
}

input Filter0 {
  status: Status0
  query: String
  limit: Int = 25
}

