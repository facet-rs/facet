# nginx.conf — deliberately broken, to exercise Snark's error reporting.

user www-data;
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    sendfile on;

    server {
        listen 80;
        server_name example.com;

        location / {
            # unterminated quoted string below
            root "/var/www/html;
            index index.html;
        }

        # stray bytes that start no valid token
        %%% not_a_directive;
    }
}
