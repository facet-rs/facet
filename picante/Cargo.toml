[package]
name = "picante"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
description = "An async incremental query runtime"
repository.workspace = true
homepage.workspace = true
readme.workspace = true
documentation = "https://docs.rs/picante"
keywords = ["incremental", "async", "memoization", "runtime"]
categories = ["asynchronous", "caching", "data-structures"]

[package.metadata]

[package.metadata."docs.rs"]
rustdoc-args = ["--html-in-header", "arborium-header.html"]

[dependencies]
dashmap.workspace = true
im.workspace = true
facet.workspace = true
facet-core.workspace = true
facet-reflect.workspace = true
facet-postcard.workspace = true
futures-util = { version = "0.3.31", default-features = false, features = ["std", "async-await"] }
parking_lot.workspace = true
tokio.workspace = true
tracing.workspace = true
picante-macros = { workspace = true, optional = true }

[features]
default = ["macros"]
macros = ["dep:picante-macros"]
# JIT-compiled deserialization using Cranelift - improves performance but adds significant compile time
jit = ["facet-postcard/jit"]

[dev-dependencies]
divan.workspace = true
tokio-test-lite.workspace = true
tracing-subscriber.workspace = true
trybuild.workspace = true

[[bench]]
name = "derived"
harness = false
