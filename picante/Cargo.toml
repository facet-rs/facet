[package]
name = "picante"
version = "3.0.0-rc.4"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors = ["Amos Wenger <amos@bearcove.eu>"]
description = "An async incremental query runtime"
repository.workspace = true
homepage = "https://facet.rs"
readme = "README.md"
documentation = "https://docs.rs/picante"
keywords = ["incremental", "async", "memoization", "runtime"]
categories = ["asynchronous", "caching", "data-structures"]

[package.metadata]

[package.metadata."docs.rs"]
rustdoc-args = ["--html-in-header", "arborium-header.html"]

[dependencies]
dashmap.workspace = true
im.workspace = true
facet.workspace = true
facet-core.workspace = true
facet-hash.workspace = true
facet-reflect.workspace = true
facet-postcard.workspace = true
futures-util.workspace = true
hashbrown.workspace = true
parking_lot.workspace = true
tokio = { workspace = true, features = ["fs", "sync", "time"] }
tracing.workspace = true
picante-macros = { workspace = true, optional = true }

[features]
default = ["macros"]
jit = ["facet-hash/jit"]
macros = ["dep:picante-macros"]

[dev-dependencies]
divan.workspace = true
tokio-test-lite.workspace = true
tracing-subscriber.workspace = true
trybuild.workspace = true

[[bench]]
name = "derived"
harness = false

[lints]
workspace = true
