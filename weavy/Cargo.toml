[package]
name = "weavy"
version = "0.2.2"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
description = "Shared lowered-program substrate for interpreters and copy-and-patch backends."
keywords = ["bytecode", "interpreter", "jit", "stencil"]
categories = ["encoding", "compilers"]
homepage = "https://facet.rs"
links = "weavy"

[package.metadata."docs.rs"]
rustdoc-args = ["--html-in-header", "arborium-header.html"]

[dependencies]
copypatch = { workspace = true }

[build-dependencies]
copypatch = { workspace = true, features = ["build"] }

[features]
# The only `jit` feature in the ecosystem (r[machine.execution.jit-single-feature]).
# Downstream crates carry none of their own; they read this crate's build-script
# decision via `links = "weavy"` + `DEP_WEAVY_JIT`.
default = ["jit"]
jit = []

# The async lane's driver uses only `core::future` — no runtime dependency.
# tokio is dev-only, to provide an executor + timers for the suspend tests.
[dev-dependencies]
tokio = { version = "1", features = ["rt-multi-thread", "macros", "time", "sync"] }

[lints]
workspace = true
