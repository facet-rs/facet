[package]
name = "weavy"
version = "0.3.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
description = "Shared lowered-program substrate for interpreters and copy-and-patch backends."
keywords = ["bytecode", "interpreter", "jit", "stencil"]
categories = ["encoding", "compilers"]
homepage = "https://facet.rs"

[package.metadata."docs.rs"]
rustdoc-args = ["--html-in-header", "arborium-header.html"]

[dependencies]
copypatch = { workspace = true, optional = true }

[build-dependencies]
copypatch = { workspace = true, features = ["build"], optional = true }

[features]
default = []
jit = ["dep:copypatch"]

# The async lane's driver uses only `core::future` — no runtime dependency.
# tokio is dev-only, to provide an executor + timers for the suspend tests.
[dev-dependencies]
tokio = { version = "1", features = ["rt-multi-thread", "macros", "time", "sync"] }

[lints]
workspace = true
