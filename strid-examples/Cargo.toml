[package]
name = "strid-examples"
description = "Examples demonstrating usage of the `strid` crate"
keywords = [ "string", "newtype", "validation", "normalization" ]
categories = [ "data-structures", "rust-patterns" ]
version = "11.0.0-rc.0"
authors = ["Marcus Griep <marcus@griep.us>"]
edition.workspace = true
rust-version.workspace = true
readme = "../strid/README.md"
license.workspace = true
repository.workspace = true
publish = true

[features]
bytestring-facet = ["facet/bytestring"]
compact_str-facet = ["facet/compact_str"]
smartstring-facet = ["facet/smartstring"]

[dependencies]
strid.workspace = true
facet.workspace = true
bytestring = { version = "1.5", features = [ "serde" ] }
serde = { version = "1", features = [ "derive" ] }
smartstring = { version = "1", features = [ "serde" ] }
compact_str = { version = "0.9", features = [ "serde" ] }
