[workspace]
changelog_update = true
semver_check = true
dependencies_update = true
git_release_enable = true

# ============================================================================
# Publishable packages - all synchronized versions, single changelog
# ============================================================================

# Core
[[package]]
name = "facet-core"
version_group = "facet"
changelog_path = "CHANGELOG.md"

[[package]]
name = "facet"
version_group = "facet"
changelog_path = "CHANGELOG.md"

# Derive macros
[[package]]
name = "facet-macros-impl"
version_group = "facet"
changelog_path = "CHANGELOG.md"

[[package]]
name = "facet-macros"
version_group = "facet"
changelog_path = "CHANGELOG.md"

# Macro ecosystem
[[package]]
name = "facet-macro-types"
version_group = "facet"
changelog_path = "CHANGELOG.md"

[[package]]
name = "facet-macro-parse"
version_group = "facet"
changelog_path = "CHANGELOG.md"

# Derive plugins
[[package]]
name = "facet-error"
version_group = "facet"
changelog_path = "CHANGELOG.md"

[[package]]
name = "facet-default"
version_group = "facet"
changelog_path = "CHANGELOG.md"

# Reflection
[[package]]
name = "facet-reflect"
version_group = "facet"
changelog_path = "CHANGELOG.md"

[[package]]
name = "facet-solver"
version_group = "facet"
changelog_path = "CHANGELOG.md"

# Test helpers
[[package]]
name = "facet-testhelpers"
version_group = "facet"
changelog_path = "CHANGELOG.md"

[[package]]
name = "facet-testhelpers-macros"
version_group = "facet"
changelog_path = "CHANGELOG.md"

# Pretty printing
[[package]]
name = "facet-pretty"
version_group = "facet"
changelog_path = "CHANGELOG.md"

# CLI & Web
[[package]]
name = "facet-urlencoded"
version_group = "facet"
changelog_path = "CHANGELOG.md"

# Utilities
[[package]]
name = "facet-value"
version_group = "facet"
changelog_path = "CHANGELOG.md"

[[package]]
name = "facet-path"
version_group = "facet"
changelog_path = "CHANGELOG.md"

[[package]]
name = "facet-shapelike"
version_group = "facet"
changelog_path = "CHANGELOG.md"

[[package]]
