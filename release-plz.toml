[workspace]
changelog_update = true
semver_check = true
dependencies_update = true
git_release_enable = true

# ============================================================================
# Publishable packages - all synchronized versions, single changelog
# ============================================================================

# Core
[[package]]
name = "facet-core"
version_group = "facet"
changelog_path = "CHANGELOG.md"

[[package]]
name = "facet"
version_group = "facet"
changelog_path = "CHANGELOG.md"

# Derive macros
[[package]]
name = "facet-macros-impl"
version_group = "facet"
changelog_path = "CHANGELOG.md"

[[package]]
name = "facet-macros"
version_group = "facet"
changelog_path = "CHANGELOG.md"

# Macro ecosystem
[[package]]
name = "facet-macro-types"
version_group = "facet"
changelog_path = "CHANGELOG.md"

[[package]]
name = "facet-macro-parse"
version_group = "facet"
changelog_path = "CHANGELOG.md"

# ============================================================================
# Dev-only packages - excluded from releases
# ============================================================================

[[package]]
name = "facet-showcase"
release = false
publish = false
