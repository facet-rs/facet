# Nextest configuration for facet
# See: https://nexte.st/docs/configuration/

experimental = ["wrapper-scripts", "setup-scripts"]

[scripts.setup.set-env-unix]
command = 'scripts/setup-test-env.sh'

[scripts.setup.set-env-windows]
command = 'scripts/setup-test-env.cmd'

[scripts.setup.vox-typescript-unix]
command = 'scripts/setup-vox-typescript.sh'

[scripts.setup.vox-typescript-windows]
command = 'scripts/setup-vox-typescript.cmd'

[scripts.wrapper.memcap]
# Memory watchdog: SIGKILL any test whose RSS exceeds MEMCAP_MB (default
# 6144 MB). A runaway test once allocated 22GB in four seconds and OOM'd the
# machine; nextest has time limits but no memory limits, and macOS has no
# cgroups, so we sample. Tune per-run with MEMCAP_MB / MEMCAP_INTERVAL.
# Nextest execs wrappers from the CRATE dir (variable nesting depth), so the
# bash trampoline resolves the workspace root at exec time.
command = "bash -c 'exec \"$(git rev-parse --show-toplevel)/scripts/memcap-wrapper.sh\" \"$@\"' memcap"

[profile.default]
# Hard cap on any single test: flag as slow at 60s, kill at 3x (180s). A stuck
# test (deadlocked select loop, wedged websocket) should fail loudly, not hang
# the run. Genuinely long tests can opt out via per-test overrides.
slow-timeout = { period = "60s", terminate-after = 3 }

# snark-dsl/snark-playground shell out to a real JS runtime (node, falling
# back to bun) once per grammar instead of using an in-process Boa evaluator.
# Left unbounded, nextest's default per-binary concurrency lets dozens of
# these run at once, spawning a matching pile of node processes on top of
# already-heavier coverage-instrumented test binaries — plausibly what
# starved a self-hosted runner of memory. Cap concurrent node-spawning tests
# instead of letting them pile up.
[test-groups.node-subprocess]
max-threads = 4

[[profile.default.scripts]]
filter = 'all()'
platform = { host = "cfg(unix)" }
setup = 'set-env-unix'

[[profile.default.scripts]]
filter = 'all()'
platform = { host = "cfg(windows)" }
setup = 'set-env-windows'

[[profile.default.scripts]]
filter = 'package(spec-tests) & test(typescript)'
platform = { host = "cfg(unix)" }
setup = 'vox-typescript-unix'

[[profile.default.scripts]]
filter = 'package(spec-tests) & test(typescript)'
platform = { host = "cfg(windows)" }
setup = 'vox-typescript-windows'

[scripts.wrapper.valgrind]
# Run tests under valgrind with leak checking
# --leak-check=full: show details for each leak
# --show-leak-kinds=all: show all leak types for diagnostics
# --errors-for-leak-kinds=definite,indirect: only fail on real leaks
# --error-exitcode=1: exit with 1 if errors found
command = 'valgrind --leak-check=full --show-leak-kinds=all --errors-for-leak-kinds=definite,indirect --error-exitcode=1'

[scripts.wrapper.valgrind-lean]
# Run tests under valgrind without leak checking
# Faster than full leak detection, just catches runtime errors
# --error-exitcode=1: exit with 1 if errors found
# --track-origins=yes: show where uninitialized values come from
# --read-var-info=yes: include variable names and source locations
# --verbose: more detailed output
command = 'valgrind --error-exitcode=1 --track-origins=yes --read-var-info=yes --verbose'

[scripts.wrapper.lldb]
# Run tests under lldb to capture backtraces on crashes
# Useful for debugging SIGABRT, SIGSEGV, etc.
# Note: nextest runs from crate dirs, so we need workspace-relative path
command = '../scripts/lldb-wrapper.sh'

[scripts.wrapper.leaks]
# Run tests under macOS `leaks -quiet --atExit`
# Fails (non-zero exit) if any allocation is unreachable at process exit
command = 'leaks -quiet --atExit --'

# Valgrind profile - runs tests under valgrind
[profile.valgrind]

[[profile.valgrind.scripts]]
# Apply valgrind wrapper to all tests (Linux/macOS with valgrind-macos)
filter = 'all()'
run-wrapper = 'valgrind'

# Valgrind-lean profile - runs tests under valgrind without leak checking
[profile.valgrind-lean]

[[profile.valgrind-lean.scripts]]
# Apply valgrind-lean wrapper to all tests (faster, no leak detection)
filter = 'all()'
run-wrapper = 'valgrind-lean'

# LLDB profile - runs tests under lldb to capture crash backtraces
[profile.lldb]

[[profile.lldb.scripts]]
# Apply lldb wrapper to all tests on macOS
platform = 'cfg(target_os = "macos")'
filter = 'all()'
run-wrapper = 'lldb'

# Leaks profile - runs each test process under macOS `leaks --atExit`
[profile.leaks]

[[profile.leaks.scripts]]
platform = 'cfg(target_os = "macos")'
filter = 'all()'
run-wrapper = 'leaks'

# Debug profile - for attaching debugger with crash handler
[profile.debug]
# Allow 24 hours for manual debugging (crash handler sleeps for 60s)
slow-timeout = { period = "86400s" }
# Don't retry on failure
retries = 0

# Fast profile - quick test runs with short timeouts to catch infinite loops
[profile.fast]
# Fail fast on first failure
fail-fast = true
# Short timeout to catch infinite loops quickly
slow-timeout = { period = "3s", terminate-after = 2 }

# Fable's declared-value/type checker tests are legitimately heavy and
# time out only under CI coverage instrumentation (observed 3x, always
# passing locally in 10-24s). Longer leash, assertions untouched.
[[profile.default.overrides]]
filter = 'test(declared_value_checker_reports_required_errors) | test(declared_type_checker_rejects_duplicate_and_unknown_names)'
slow-timeout = { period = "120s", terminate-after = 5 }

# The real-workspace dependency-probe shards exercise the production manifest
# walk against a large workspace. They are bounded but several shards exceed the
# default 180s cap on local macOS runs.
[[profile.default.overrides]]
filter = 'package(vix) & binary(cargo_manifest) & test(real_workspace_dependency_probe_shard_)'
slow-timeout = { period = "300s", terminate-after = 2 }

[[profile.default.overrides]]
filter = 'package(vix) & binary(reloc_selection)'
threads-required = "num-cpus"

# The vendored-playground sweeps now shell out to a real JS runtime (node)
# once per bundle instead of an in-process Boa evaluator, and coverage
# instrumentation makes subprocess-heavy tests noticeably slower in CI.
[[profile.default.overrides]]
filter = 'package(snark-playground) & (test(vendored_playground_samples_parse_from_rust) | test(representative_vendored_playground_samples_parse_from_rust))'
slow-timeout = { period = "120s", terminate-after = 5 }

# Bound the number of node processes that can be in flight at once; see the
# node-subprocess test-group definition above.
[[profile.default.overrides]]
filter = 'package(snark-dsl) | package(snark-playground)'
test-group = 'node-subprocess'

# Same coverage-instrumentation slowdown as the fable checker tests above.
[[profile.default.overrides]]
filter = 'package(vix) & test(ast_structural_projection_contracts_are_pinned)'
slow-timeout = { period = "120s", terminate-after = 5 }

# The accepted-rungs certificate compiles, verifies, and executes the whole
# accepted rung ladder through one executable. It runs ~135s on the native lane
# and completes in ~134s on the interpreter lane in isolation, but under the full
# WEAVY_JIT=0 suite's parallel load it can drift past the default 180s cap. It is
# bounded and always passing; give it the same longer leash as the other heavy
# vix certificates.
[[profile.default.overrides]]
filter = 'package(vix) & test(accepted_rungs_verify_and_execute_through_one_executable)'
slow-timeout = { period = "120s", terminate-after = 5 }

# The cross-lane differential (F1) compiles the accepted canonical corpus
# (through rung 065) once and executes every accepted rung through both an
# explicitly-selected native Executable and an explicitly-selected interpreter
# Executable, plain and chaos. It runs the 10M-iteration tail-recursion rung 050
# and the million-element molten rung 051 through the *interpreter* lane twice
# (plain + chaos), which dominates the cost: in isolation it is ~123s, but under
# the parallel load of a full `--workspace` run it has been observed at ~390s,
# and the coverage-instrumented native leg is slower still. It is bounded and
# always passing; give it a generous leash (well under a 1200s hard cap) so
# workspace contention or coverage cannot flake it, on the same shape as the
# other heavy vix certificates.
[[profile.default.overrides]]
filter = 'package(vix) & test(accepted_corpus_agrees_across_native_and_interpreter_lanes)'
slow-timeout = { period = "300s", terminate-after = 4 }
