[package]
name = "rediff"
version = "0.50.0-rc.0"
edition.workspace = true
rust-version.workspace = true
authors = ["Amos Wenger <amos@bearcove.eu>"]
license.workspace = true
repository.workspace = true
description = "Diff and compare Facet values with detailed structural difference reporting"
documentation = "https://docs.rs/rediff"
keywords = ["diff", "compare", "testing", "facet", "assertion"]
categories = ["development-tools::testing", "rust-patterns"]
homepage = "https://facet.rs"

[package.metadata.docs.rs]
rustdoc-args = ["--html-in-header", "arborium-header.html"]

[package.metadata."docs.rs"]
rustdoc-args = ["--html-in-header", "arborium-header.html"]

[features]
default = []
tracing = ["dep:tracing"]

[dependencies]
facet.workspace = true
facet-core.workspace = true
facet-pretty.workspace = true
facet-reflect.workspace = true
confusables.workspace = true
indextree.workspace = true
owo-colors.workspace = true
palette.workspace = true
terminal-colorsaurus.workspace = true
unicode-width.workspace = true
tracing = { workspace = true, optional = true }

[dev-dependencies]
facet = { path = "../facet", features = [
  "all-impls",
] }
tracing.workspace = true

[lints]
workspace = true
