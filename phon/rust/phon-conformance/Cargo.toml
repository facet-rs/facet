[package]
name = "phon-conformance"
version = "0.2.0-rc.4"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
description = "Generator and Rust loader for phon's cross-language conformance corpus."

[package.metadata]

[package.metadata."docs.rs"]
rustdoc-args = ["--html-in-header", "arborium-header.html"]

[[bin]]
name = "phon-conformance"
path = "src/main.rs"

[[bin]]
name = "gen_compat_vectors"
path = "src/bin/gen_compat_vectors.rs"

[dependencies]
phon-schema.workspace = true
phon-engine.workspace = true
facet-value.workspace = true
facet = { workspace = true }
facet-json.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
