[package]
name = "phon-conformance"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Generator and Rust loader for phon's cross-language conformance corpus."

[[bin]]
name = "phon-conformance"
path = "src/main.rs"

[[bin]]
name = "gen_compat_vectors"
path = "src/bin/gen_compat_vectors.rs"

[dependencies]
phon-schema.workspace = true
phon-engine.workspace = true
facet-value.workspace = true
facet = { workspace = true }
