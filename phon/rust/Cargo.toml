[workspace]
resolver = "3"
members = [
  "copypatch",
  "phon-schema",
  "phon-ir",
  "phon-engine",
  "phon-jit",
  "phon",
  "phon-codegen",
  "phon-conformance",
]

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
repository = "https://github.com/bearcove/phon"

[workspace.dependencies]
copypatch = { path = "copypatch" }
phon-schema = { path = "phon-schema" }
phon-ir = { path = "phon-ir" }
phon-engine = { path = "phon-engine" }
phon-jit = { path = "phon-jit" }

blake3 = "1.8"
facet = "0.46"
facet-value = "0.46"
proptest = "1.11"

# facet-value's i128/u128 + native char support is committed locally but not yet
# released; point at the local checkout until those releases are cut. (The same
# applies to facet once phon's front door needs unreleased changes.)
#
# The facet crates are patched to the local ~/facet checkout: the typed engine's
# owned-sequence path needs `ListTypeOps::from_raw_parts`, added there but not yet
# released. facet-value/facet-dessert/facet-format come from the *separate*
# facet-format workspace and stay on their own local paths above.
[patch.crates-io]
facet-value = { path = "../../facet-format/facet-value" }
facet = { path = "../../facet/facet" }
facet-core = { path = "../../facet/facet-core" }
facet-macros = { path = "../../facet/facet-macros" }
facet-macro-parse = { path = "../../facet/facet-macro-parse" }
facet-macro-types = { path = "../../facet/facet-macro-types" }
facet-macros-impl = { path = "../../facet/facet-macros-impl" }
facet-path = { path = "../../facet/facet-path" }
facet-reflect = { path = "../../facet/facet-reflect" }
facet-solver = { path = "../../facet/facet-solver" }
