[workspace]
resolver = "3"
members = [
  "copypatch",
  "phon-schema",
  "phon-ir",
  "phon-engine",
  "phon-jit",
  "phon",
  "phon-codegen",
  "phon-conformance",
]

[workspace.package]
version = "0.2.0-rc.0"
edition = "2024"
license = "MIT OR Apache-2.0"
repository = "https://github.com/bearcove/phon"

[workspace.dependencies]
copypatch = { path = "copypatch", version = "0.2.0-rc.0" }
phon = { path = "phon", version = "0.2.0-rc.0" }
phon-schema = { path = "phon-schema", version = "0.2.0-rc.0" }
phon-ir = { path = "phon-ir", version = "0.2.0-rc.0" }
phon-engine = { path = "phon-engine", version = "0.2.0-rc.0" }
phon-jit = { path = "phon-jit", version = "0.2.0-rc.0" }

blake3 = "1.8"
facet = "0.50.0-rc.0"
facet-json = "0.50.0-rc.0"
facet-value = "0.50.0-rc.0"
proptest = "1.11"
