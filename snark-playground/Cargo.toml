[package]
name = "snark-playground"
version = "0.0.1"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
description = "Native playground backend for Snark grammar bundles"
publish = false

[package.metadata]

[package.metadata."docs.rs"]
rustdoc-args = ["--html-in-header", "arborium-header.html"]

[dependencies]
facet.workspace = true
facet-json.workspace = true
margin.workspace = true
regex.workspace = true
web-time = "1"
snark = { path = "../snark", features = ["tree-sitter-import"] }
snark-scanner-host = { path = "../snark-scanner-host" }

[dev-dependencies]
snark-dsl = { path = "../snark-dsl", features = ["native"] }

[lints]
workspace = true
